<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DropFlow Importer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1e2330;
    }
    .logo { font-size: 18px; }
    .header-title { font-weight: 700; font-size: 15px; color: #fff; flex: 1; }
    .user-badge {
      font-size: 11px;
      color: #64748b;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Screens ── */
    .screen { display: none; padding: 16px; flex-direction: column; gap: 12px; }
    .screen.active { display: flex; }

    /* ── Login ── */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 11px; color: #94a3b8; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .field input {
      padding: 8px 10px;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 7px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #3b82f6; }

    /* ── Buttons ── */
    .btn {
      padding: 9px 14px;
      border: none;
      border-radius: 7px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #2563eb; }
    .btn-success { background: #10b981; color: #fff; font-size: 14px; padding: 11px; }
    .btn-success:hover:not(:disabled) { background: #059669; }
    .btn-ghost {
      background: transparent;
      color: #64748b;
      border: 1px solid #2d3748;
      font-size: 12px;
      padding: 6px 10px;
    }
    .btn-ghost:hover { color: #94a3b8; border-color: #4b5563; }

    /* ── Product card ── */
    .product-card {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 10px;
      overflow: hidden;
    }
    .product-img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: #2d3748;
    }
    .product-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
    .product-title {
      font-size: 12px;
      color: #cbd5e1;
      line-height: 1.4;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-prices {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .price-cny { font-size: 11px; color: #64748b; }
    .price-usd { font-size: 14px; font-weight: 700; color: #3b82f6; }
    .price-suggested { font-size: 12px; color: #10b981; }
    .product-variants {
      font-size: 11px;
      color: #64748b;
    }

    /* ── States ── */
    .error-msg {
      padding: 8px 10px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 7px;
      color: #f87171;
      font-size: 12px;
      line-height: 1.4;
    }
    .success-msg {
      padding: 8px 10px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 7px;
      color: #34d399;
      font-size: 12px;
      text-align: center;
    }
    .info-msg {
      padding: 8px 10px;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 7px;
      color: #93c5fd;
      font-size: 12px;
      line-height: 1.4;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #3b82f6;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Store selector ── */
    .store-select {
      padding: 7px 10px;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 7px;
      color: #e2e8f0;
      font-size: 12px;
      width: 100%;
      outline: none;
      cursor: pointer;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      border-top: 1px solid #1e2330;
    }
    .footer-link {
      font-size: 11px;
      color: #475569;
      text-decoration: none;
      cursor: pointer;
    }
    .footer-link:hover { color: #94a3b8; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="logo">⚡</span>
    <span class="header-title">DropFlow</span>
    <span class="user-badge" id="userEmail"></span>
  </div>

  <!-- Screen: Login -->
  <div class="screen active" id="screenLogin">
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="loginError" class="error-msg" style="display:none"></div>
    <button class="btn btn-primary" id="btnLogin">Sign In</button>
  </div>

  <!-- Screen: Not on 1688 -->
  <div class="screen" id="screenNotOn1688">
    <div class="info-msg">
      👋 Navigate to a product page on <strong>1688.com</strong> and click the import button that appears.
    </div>
    <a href="https://www.dropflow-app.com" target="_blank" class="btn btn-ghost" style="text-align:center;">
      Open DropFlow ↗
    </a>
  </div>

  <!-- Screen: Loading product -->
  <div class="screen" id="screenLoading">
    <div style="display:flex;align-items:center;gap:10px;color:#64748b;">
      <div class="spinner"></div>
      <span>Reading product data...</span>
    </div>
  </div>

  <!-- Screen: Product preview -->
  <div class="screen" id="screenProduct">
    <div class="product-card">
      <img class="product-img" id="productImg" src="" alt="product">
      <div class="product-body">
        <div class="product-title" id="productTitle"></div>
        <div class="product-prices">
          <span class="price-cny" id="priceCNY"></span>
          <span class="price-usd" id="priceUSD"></span>
          <span class="price-suggested" id="priceSuggested"></span>
        </div>
        <div class="product-variants" id="productVariants"></div>
      </div>
    </div>

    <div class="field">
      <label>Add to store</label>
      <select class="store-select" id="storeSelect"></select>
    </div>

    <div id="importError" class="error-msg" style="display:none"></div>
    <div id="importSuccess" class="success-msg" style="display:none"></div>

    <button class="btn btn-success" id="btnImport">
      📥 Add to DropFlow
    </button>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span id="footerStatus" style="font-size:11px;color:#475569;">Ready</span>
    <span class="footer-link" id="btnLogout" style="display:none">Sign out</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
